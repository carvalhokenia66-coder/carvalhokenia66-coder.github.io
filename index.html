<!DOCTYPE html> 
<html>
  <head>
    <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
    }

    .menu {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #1e125f;
    padding: 15px 30px;
    }

    .logo {
    color: #fff;
    font-size: 22px;
    font-weight: bold;
    }

    .nav-links {
    list-style: none;
    display: flex;
    }

    .nav-links li {
    margin-left: 20px;
    }

    .nav-links a {
    text-decoration: none;
    color: #fff;
    font-size: 16px;
    transition: 0.3s;
    }

    .nav-links a:hover {
    color: #4f34bc;
    }
      
      </style>
  </head>
  <body>

    <header>
      <nav class="menu">
        <div class="logo">Gestão Hospitalar</div>
        <a href="/">
          <img src="https://carvalhokenia66-coder.github.io/logo.png" alt="Gestão Hospitalar" width="150" height="150"></a>

        <ul class="nav-links">
          <li><a href="#">Início</a></li>
          <li><a href="#">Pacientes</a></li>
          <li><a href="#">Consultas</a></li>
          <li><a href="#">Médicos</a></li>
          <li><a href="#">Internações</a></li>
          <li><a href="#">Relatórios</a></li>
          <li><a href="#">Financeiro</a></li>
          <li><a href="#">Configurações</a></li>
        </ul>
      </nav>
    </header>

 </body>
</html>
